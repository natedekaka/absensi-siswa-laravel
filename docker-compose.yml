version: '3.8'

services:
  app:
    build: .
    container_name: absensi-siswa-laravel
    ports:
      - "8082:8082"
    volumes:
      - ./:/var/www/html
    working_dir: /var/www/html
    command: php -S 0.0.0.0:8082 router.php
    environment:
      - DB_HOST=10.89.7.2
      - DB_PORT=3306
      - DB_DATABASE=absensi_siswa
      - DB_USERNAME=root
      - DB_PASSWORD=rootpass
    restart: unless-stopped
    dns:
      - 8.8.8.8
    network_mode: bridge
